<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Banner Debate Archi - Solo Video</title>

<style>
  body, html {
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background:#000; 
  }

  .banner-container {
    width:386px;
    height:500px;
    margin:auto;
    position:relative;
    overflow:hidden;
    background-color: #222; /* Fondo por si la imagen tarda en cargar */
  }

  .banner-img {
    width:386px;
    height:500px;
    display:block;
    object-fit: cover;
  }

  /* VIDEO sobre el banner */
  .banner-video {
    position:absolute;
    top:100px;    /* Ajusta según el diseño de tu imagen */
    left:13px;    /* Centrado manual basado en tu ancho */
    width:360px;  
    height:203px; 
    border:0;
    display:block;
    background: #000;
  }
</style>
</head>

<body>

<div class="banner-container">

  <img class="banner-img"
       src="https://www.epicentrochile.com/wp-content/uploads/2026/03/CAMBIO_MOV.jpg"
       alt="Banner Debate Archi">

  <iframe
    class="banner-video"
    src="https://www.youtube.com/embed/6m5IXZk-oHE?autoplay=1&mute=1&rel=0"
    title="YouTube video player"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
  </iframe>

</div>

</body>
</html>
